experiment_name: qwen3_1p7b_ablation
data_root: ${REMOTE_DATA_ROOT}
output_dir: ${REMOTE_EXPERIMENT_ROOT}/qwen3_1p7b_ablation
languages:
  - km_kh
  - th_th

prepare:
  extract_audio: false

analysis:
  enabled: true
  split: train
  max_examples_per_language: 1000
  tokenizers:
    - Qwen/Qwen3-1.7B
    - openai/whisper-small

model:
  speech_encoder_name: facebook/wav2vec2-xls-r-300m
  llm_name: Qwen/Qwen3-1.7B
  prefix_length: 64
  freeze_speech_encoder: true
  freeze_llm: true

data:
  max_duration_seconds: 16
  max_text_length: 256
  sample_limit: 1000

train:
  seed: 42
  local_files_only: true
  batch_size: 1
  gradient_accumulation_steps: 16
  epochs: 1
  max_steps: 300
  learning_rate: 0.00005
  weight_decay: 0.01
  fp16: true
  gradient_checkpointing: true
  max_grad_norm: 1.0
  log_every: 10
  save_every: 100
  num_workers: 2
  lora:
    enabled: true
    r: 8
    alpha: 16
    dropout: 0.05
    target_modules:
      - q_proj
      - k_proj
      - v_proj
      - o_proj
