experiment_name: qwen3_0p6b_probe200
data_root: ${REMOTE_DATA_ROOT}
output_dir: ${REMOTE_EXPERIMENT_ROOT}/qwen3_0p6b_probe200
languages:
  - km_kh
  - lo_la
  - my_mm
  - th_th

prepare:
  extract_audio: false

analysis:
  enabled: false

model:
  speech_encoder_name: facebook/wav2vec2-xls-r-300m
  llm_name: Qwen/Qwen3-0.6B
  prefix_length: 64
  freeze_speech_encoder: true
  freeze_llm: true

data:
  max_duration_seconds: 16
  max_text_length: 256
  sample_limit: 2000

train:
  seed: 42
  batch_size: 1
  gradient_accumulation_steps: 8
  epochs: 2
  max_steps: 200
  learning_rate: 0.0001
  weight_decay: 0.01
  warmup_steps: 10
  fp16: true
  gradient_checkpointing: true
  max_grad_norm: 1.0
  log_every: 10
  save_every: 100
  num_workers: 2
  lora:
    enabled: false
    r: 8
    alpha: 16
    dropout: 0.05
    target_modules:
      - q_proj
      - k_proj
      - v_proj
      - o_proj
