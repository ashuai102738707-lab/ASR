experiment_name: qwen3_0p6b_full
data_root: ${REMOTE_DATA_ROOT}
output_dir: ${REMOTE_EXPERIMENT_ROOT}/qwen3_0p6b_full
languages:
  - km_kh
  - lo_la
  - my_mm
  - th_th

prepare:
  extract_audio: false

analysis:
  enabled: true
  split: train
  max_examples_per_language: 2000
  tokenizers:
    - Qwen/Qwen3-0.6B
    - Qwen/Qwen3-1.7B
    - openai/whisper-small

model:
  speech_encoder_name: facebook/wav2vec2-xls-r-300m
  llm_name: Qwen/Qwen3-0.6B
  prefix_length: 64
  freeze_speech_encoder: true
  freeze_llm: true

data:
  max_duration_seconds: 18
  max_text_length: 256

train:
  seed: 42
  batch_size: 1
  gradient_accumulation_steps: 16
  epochs: 3
  max_steps: 0
  learning_rate: 0.0001
  weight_decay: 0.01
  fp16: true
  gradient_checkpointing: true
  max_grad_norm: 1.0
  log_every: 10
  save_every: 500
  num_workers: 2
  lora:
    enabled: true
    r: 8
    alpha: 16
    dropout: 0.05
    target_modules:
      - q_proj
      - k_proj
      - v_proj
      - o_proj
