# Qwen3 speech-to-text smoke experiment.
# This config is intentionally short-running. Increase train.max_steps after the
# data/tokenizer/model path has been verified on the server.

experiment_name: qwen3_0p6b_smoke
data_root: ${REMOTE_DATA_ROOT}
output_dir: ${REMOTE_EXPERIMENT_ROOT}/qwen3_0p6b_smoke
languages:
  - km_kh
  - lo_la
  - my_mm
  - th_th

prepare:
  extract_audio: true

analysis:
  enabled: true
  split: train
  max_examples_per_language: 200
  tokenizers:
    - Qwen/Qwen3-0.6B

model:
  speech_encoder_name: facebook/wav2vec2-xls-r-300m
  llm_name: Qwen/Qwen3-0.6B
  prefix_length: 64
  freeze_speech_encoder: true
  freeze_llm: true

data:
  max_duration_seconds: 16
  max_text_length: 256
  sample_limit: 128

train:
  seed: 42
  batch_size: 1
  gradient_accumulation_steps: 8
  epochs: 1
  max_steps: 20
  learning_rate: 0.0001
  weight_decay: 0.01
  warmup_steps: 2
  fp16: true
  gradient_checkpointing: true
  max_grad_norm: 1.0
  log_every: 1
  save_every: 0
  num_workers: 0
  lora:
    enabled: false
    r: 8
    alpha: 16
    dropout: 0.05
    target_modules:
      - q_proj
      - k_proj
      - v_proj
      - o_proj
